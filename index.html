<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Control de visitas - La Libertad y Cajamarca</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>Control de visitas - La Libertad y Cajamarca</h1>
    <p>Mapa público con puntos desde JSON, sin API key.</p>
  </header>

  <main>
    <aside class="panel">
      <div class="controls">
        <input id="searchInput" type="search" placeholder="Buscar por nombre, CC, dirección o texto..." />

        <select id="departmentFilter">
          <option value="todos">Todos los departamentos</option>
          <option value="La Libertad">La Libertad</option>
          <option value="Cajamarca">Cajamarca</option>
        </select>

        <select id="statusFilter">
          <option value="todos">Todos los estados</option>
          <option value="sin_visitar">Sin visitar</option>
          <option value="visitada">Visitada</option>
        </select>

        <button id="locateBtn">Detectar mi ubicación</button>
        <button id="resetBtn">Ver toda mi jurisdicción</button>
      </div>

      <div id="message" class="message"></div>
      <div id="list" class="list"></div>
    </aside>

    <section id="map"></section>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
