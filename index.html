<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Control de visitas móvil</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>Control de visitas</h1>
    <p>La Libertad y Cajamarca · sin API key</p>
  </header>

  <main>
    <section id="map"></section>

    <aside class="panel">
      <button id="togglePanelBtn" class="toggle-panel">Mostrar / ocultar lista y filtros</button>

      <div id="panelContent" class="panel-content">
        <section class="controls">
          <input id="searchInput" type="search" placeholder="Buscar nombre, CC, dirección o texto..." />

          <select id="departmentFilter">
            <option value="todos">Todos los departamentos</option>
            <option value="La Libertad">La Libertad</option>
            <option value="Cajamarca">Cajamarca</option>
          </select>

          <select id="statusFilter">
            <option value="todos">Todos los estados</option>
            <option value="sin_visitar">Sin visitar</option>
            <option value="visitada">Visitada</option>
          </select>

          <button id="locateBtn">Detectar mi ubicación</button>
          <button id="nearestBtn">Ir al punto más cercano</button>
          <button id="fitBtn">Ajustar a resultados</button>
          <button id="resetBtn">Ver jurisdicción completa</button>
        </section>

        <section id="message" class="message">Cargando datos...</section>
        <section id="stats" class="stats"></section>
        <section id="list" class="list"></section>
      </div>
    </aside>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
